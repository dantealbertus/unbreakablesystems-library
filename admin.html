<html lang="en">
<head>

<style>
  :root {
    --bg: #050507;
    --surface: rgba(255,255,255,0.032);
    --surface2: rgba(255,255,255,0.058);
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #f0ece2;
    --green: #5c7a62;
    --green-base: #344a3a;
    --danger: #e05c5c;
    --text: #f0ece2;
    --muted: rgba(240,236,226,0.62);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:17px; line-height:1.6; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; }

  .aurora { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .aurora-1 { position:absolute; top:-320px; left:50%; transform:translateX(-50%); width:1100px; height:700px; background:radial-gradient(ellipse at 50% 40%, rgba(52,74,58,0.55) 0%, rgba(52,74,58,0.2) 35%, transparent 70%); filter:blur(40px); }
  .aurora-2 { position:absolute; top:60px; left:-200px; width:600px; height:600px; background:radial-gradient(circle, rgba(52,74,58,0.25) 0%, transparent 65%); filter:blur(60px); }
  .aurora-3 { position:absolute; top:100px; right:-150px; width:500px; height:500px; background:radial-gradient(circle, rgba(100,180,255,0.04) 0%, transparent 65%); filter:blur(60px); }

  /* LOGIN */
  #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
  .login-box { background:rgba(255,255,255,0.032); border:1px solid var(--border); border-radius:20px; padding:52px 44px; width:100%; max-width:420px; text-align:center; backdrop-filter:blur(20px); }
  .login-sub { color:var(--muted); font-size:15px; margin-bottom:36px; }
  .login-box input[type="password"] { width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:17px; padding:14px 18px; outline:none; text-align:center; letter-spacing:0.2em; margin-bottom:14px; transition:border-color 0.2s; }
  .login-box input:focus { border-color:rgba(92,122,98,0.5); }
  .login-btn { width:100%; background:var(--accent); color:#080809; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; border:none; padding:15px; border-radius:10px; cursor:pointer; transition:opacity 0.2s; }
  .login-btn:hover { opacity:0.88; }
  .login-err { color:var(--danger); font-size:14px; margin-top:12px; display:none; }

  /* APP */
  #adminApp { display:none; position:relative; z-index:1; }

  header {
    position:sticky; top:0; z-index:100;
    padding:0 48px; height:90px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.055);
    background:rgba(5,5,7,0.38);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
  }
  .h-left { display:flex; align-items:center; gap:16px; }
  .admin-badge { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; background:rgba(92,122,98,0.15); color:rgba(92,122,98,0.9); padding:6px 14px; border-radius:100px; border:1px solid rgba(92,122,98,0.25); }
  .logout-btn { font-size:14px; color:var(--muted); background:transparent; border:1px solid var(--border); padding:9px 20px; border-radius:100px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .logout-btn:hover { color:var(--text); border-color:var(--border-hover); }

  /* LIST PAGE */
  .list-page { max-width:1000px; margin:0 auto; padding:48px 48px 120px; position:relative; z-index:1; }
  .list-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; gap:16px; }
  .list-title { font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; letter-spacing:-0.4px; }
  .count-lbl { font-size:15px; color:var(--muted); }
  .new-btn { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; background:var(--accent); color:#080809; border:none; padding:12px 24px; border-radius:10px; cursor:pointer; transition:opacity 0.2s; white-space:nowrap; }
  .new-btn:hover { opacity:0.88; }

  .sys-row { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px 26px; margin-bottom:14px; display:flex; align-items:flex-start; gap:18px; transition:border-color 0.2s, background 0.2s; cursor:pointer; }
  .sys-row:hover { border-color:var(--border-hover); background:var(--surface2); }
  .sys-row.is-draft { opacity:0.5; }
  .sys-info { flex:1; min-width:0; }
  .sys-name { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19px; letter-spacing:-0.2px; margin-bottom:10px; }
  .sys-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .sys-cat { font-size:11px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; padding:4px 11px; border-radius:100px; }
  .status-badge-published { font-size:12px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:rgba(92,122,98,0.9); background:rgba(92,122,98,0.15); border:1px solid rgba(92,122,98,0.25); padding:3px 10px; border-radius:100px; }
  .status-badge-draft { font-size:12px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:rgba(240,236,226,0.4); background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:3px 10px; border-radius:100px; }
  .sys-desc { font-size:15px; color:var(--muted); line-height:1.6; }
  .sys-actions { display:flex; flex-direction:column; gap:8px; flex-shrink:0; align-items:flex-end; }
  .btn-edit { font-size:13px; font-family:'DM Sans',sans-serif; padding:8px 16px; border-radius:8px; cursor:pointer; background:var(--surface2); color:var(--text); border:1px solid var(--border); transition:all 0.2s; white-space:nowrap; }
  .btn-edit:hover { border-color:var(--border-hover); }
  .btn-del { font-size:13px; font-family:'DM Sans',sans-serif; padding:8px 16px; border-radius:8px; cursor:pointer; background:transparent; color:var(--danger); border:1px solid rgba(255,96,96,0.2); transition:all 0.2s; white-space:nowrap; }
  .btn-del:hover { background:rgba(255,96,96,0.08); border-color:rgba(255,96,96,0.4); }
  .btn-status { font-size:13px; font-family:'DM Sans',sans-serif; padding:8px 16px; border-radius:8px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.2s; white-space:nowrap; }
  .btn-status:hover { color:var(--text); border-color:var(--border-hover); }

  .empty-list { padding:64px 0; text-align:center; color:var(--muted); font-size:17px; }

  .export-row { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:18px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:32px; }
  .export-lbl { font-size:15px; color:var(--muted); }
  .export-btn { font-size:14px; font-family:'DM Sans',sans-serif; font-weight:500; background:var(--surface); color:var(--text); border:1px solid var(--border); padding:9px 20px; border-radius:100px; cursor:pointer; transition:all 0.2s; }
  .export-btn:hover { border-color:var(--border-hover); }

  /* Category pills */
  .cat-operations    { background:rgba(52,74,58,0.45);   color:#7a9e80;  border:1px solid rgba(92,122,98,0.2); }
  .cat-lead-gen      { background:rgba(160,110,70,0.12);  color:#b8906a;  border:1px solid rgba(160,110,70,0.22); }
  .cat-content       { background:rgba(80,110,145,0.14);  color:#7a9eb8;  border:1px solid rgba(80,110,145,0.22); }
  .cat-reporting     { background:rgba(115,95,145,0.12);  color:#9a88b0;  border:1px solid rgba(115,95,145,0.22); }
  .cat-communication { background:rgba(55,130,115,0.12);  color:#60a090;  border:1px solid rgba(55,130,115,0.22); }

  /* EDIT MODAL */
  .edit-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.80); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); display:none; align-items:flex-start; justify-content:center; padding:48px 20px; overflow-y:auto; }
  .edit-overlay.open { display:flex; }
  .edit-modal { background:#0d0d12; border:1px solid rgba(255,255,255,0.1); border-radius:22px; width:100%; max-width:680px; margin:auto; animation:modalIn 0.26s ease; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.96) translateY(14px); } to { opacity:1; transform:scale(1) translateY(0); } }

  .edit-modal-header { padding:36px 44px 0; display:flex; align-items:center; justify-content:space-between; }
  .edit-modal-title { font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:700; letter-spacing:-0.4px; }
  .edit-modal-close { width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); background:transparent; color:var(--muted); font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; line-height:1; }
  .edit-modal-close:hover { background:rgba(255,255,255,0.07); color:var(--text); }

  .edit-modal-body { padding:28px 44px 44px; }

  .fg { margin-bottom:22px; }
  label { display:block; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:10px; }
  input, select, textarea {
    width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border);
    border-radius:10px; color:#f0ece2; font-family:'DM Sans',sans-serif;
    font-size:17px; padding:14px 17px; outline:none; transition:border-color 0.2s;
  }
  input::placeholder, textarea::placeholder { color:rgba(240,236,226,0.3); }
  input:focus, select:focus, textarea:focus { border-color:rgba(92,122,98,0.5); background:rgba(255,255,255,0.09); color:#ffffff; }
  select option { background:#111; }
  textarea { resize:vertical; min-height:100px; line-height:1.6; }
  .hint { font-size:13px; color:var(--muted); margin-top:8px; line-height:1.5; }
  .frow { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  /* Category manager inside modal */
  .cat-manager { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
  .cat-list { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; min-height:32px; }
  .cat-tag { display:flex; align-items:center; gap:6px; background:rgba(92,122,98,0.15); border:1px solid rgba(92,122,98,0.25); color:rgba(92,122,98,0.9); font-size:13px; font-weight:500; padding:5px 12px; border-radius:100px; }
  .cat-tag-del { background:none; border:none; color:rgba(92,122,98,0.6); cursor:pointer; font-size:16px; line-height:1; padding:0; display:flex; align-items:center; transition:color 0.15s; }
  .cat-tag-del:hover { color:var(--danger); }
  .cat-add-row { display:flex; gap:8px; }
  .cat-add-row input { flex:1; font-size:14px; padding:9px 13px; }
  .cat-add-btn { background:rgba(92,122,98,0.2); border:1px solid rgba(92,122,98,0.3); color:rgba(92,122,98,0.9); font-size:14px; font-weight:600; padding:9px 16px; border-radius:9px; cursor:pointer; white-space:nowrap; transition:all 0.18s; font-family:'DM Sans',sans-serif; }
  .cat-add-btn:hover { background:rgba(92,122,98,0.3); }

  .edit-modal-footer { display:flex; flex-direction:column; gap:10px; padding-top:8px; }
  .submit-btn { width:100%; background:var(--accent); color:#080809; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; border:none; padding:16px; border-radius:10px; cursor:pointer; transition:opacity 0.2s; }
  .submit-btn:hover { opacity:0.88; }
  .cancel-btn { width:100%; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:15px; border:1px solid var(--border); padding:13px; border-radius:10px; cursor:pointer; transition:all 0.2s; }
  .cancel-btn:hover { color:var(--text); border-color:var(--border-hover); }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:rgba(255,255,255,0.03); border-radius:10px; }
  ::-webkit-scrollbar-thumb { background:rgba(92,122,98,0.35); border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(92,122,98,0.55); }
  * { scrollbar-width:thin; scrollbar-color:rgba(92,122,98,0.35) rgba(255,255,255,0.03); }
</style>
</head>
<body>

<div class="aurora" aria-hidden="true">
  <div class="aurora-1"></div><div class="aurora-2"></div><div class="aurora-3"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="margin-bottom:10px">
      <svg width="200" height="38" viewBox="0 0 200 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="3" width="5" height="31" rx="1.5" fill="#344a3a"/>
        <rect x="10" y="3" width="5" height="31" rx="1.5" fill="#5c7a62"/>
        <text x="22" y="19" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="18" fill="#f0ece2" letter-spacing="-0.5">Unbreakable</text>
        <text x="22" y="33" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="11" fill="rgba(240,236,226,0.45)" letter-spacing="2.8">SYSTEMS</text>
      </svg>
    </div>
    <p class="login-sub">Admin access only</p>
    <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Sign in →</button>
    <div class="login-err" id="loginErr">Incorrect password.</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <header>
    <div class="h-left">
      <svg width="180" height="30" viewBox="0 0 180 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="2" width="5" height="25" rx="1" fill="#344a3a"/>
        <rect x="10" y="2" width="5" height="25" rx="1" fill="#5c7a62"/>
        <text x="21" y="17" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="16" fill="#f0ece2" letter-spacing="-0.5">Unbreakable</text>
        <text x="21" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="10" fill="rgba(240,236,226,0.45)" letter-spacing="2.5">SYSTEMS</text>
      </svg>
      <span class="admin-badge">Admin</span>
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </header>

  <div class="list-page">
    <div class="list-hdr">
      <div>
        <div class="list-title">Systems Library</div>
        <div class="count-lbl" id="countLbl">0 systems</div>
      </div>
      <button class="new-btn" onclick="openEditModal(null)">+ New system</button>
    </div>
    <div id="sysList"></div>
    <div class="export-row">
      <span class="export-lbl">Export all systems as JSON backup</span>
      <button class="export-btn" onclick="exportJSON()">Download</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-modal">
    <div class="edit-modal-header">
      <div class="edit-modal-title" id="editModalTitle">New system</div>
      <button class="edit-modal-close" onclick="closeEditModal()">&#215;</button>
    </div>
    <div class="edit-modal-body">
      <input type="hidden" id="editId">

      <div class="fg">
        <label>Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Invoice Processing Agent">
      </div>

      <div class="frow">
        <div class="fg">
          <label>Category *</label>
          <select id="f-cat"><option value="">Choose category</option></select>
        </div>
        <div class="fg">
          <label>Status</label>
          <select id="f-status">
            <option value="Published">Published</option>
            <option value="Draft">Draft</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label>Manage categories</label>
        <div class="cat-manager">
          <div class="cat-list" id="catList"></div>
          <div class="cat-add-row">
            <input type="text" id="catInput" placeholder="New category name" onkeydown="if(event.key==='Enter'){event.preventDefault();addCategory();}">
            <button class="cat-add-btn" onclick="addCategory()">+ Add</button>
          </div>
        </div>
      </div>

      <div class="fg">
        <label>Description *</label>
        <textarea id="f-desc" placeholder="What does this system do?"></textarea>
      </div>
      <div class="fg">
        <label>YouTube URL</label>
        <input type="text" id="f-video" placeholder="https://www.youtube.com/watch?v=...">
      </div>
      <div class="fg">
        <label>Thumbnail URL <span style="color:var(--muted);font-weight:400;font-size:12px;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="f-thumb" placeholder="https://example.com/image.jpg">
        <div class="hint">Leave empty if you have a YouTube video.</div>
      </div>
      <div class="fg">
        <label>Tags</label>
        <input type="text" id="f-tags" placeholder="Gmail, GPT-4, Make.com">
        <div class="hint">Comma-separated</div>
      </div>
      <div class="fg">
        <label>Benefits</label>
        <textarea id="f-benefits" placeholder="No more manual data entry&#10;Invoices processed within seconds&#10;Automatic sync with bookkeeping" style="min-height:120px"></textarea>
        <div class="hint">One benefit per line</div>
      </div>
      <div class="fg">
        <label>Problems it solves</label>
        <textarea id="f-problems" placeholder="Time-consuming manual processing&#10;Errors from retyping data&#10;Delays in the workflow" style="min-height:120px"></textarea>
        <div class="hint">One problem per line</div>
      </div>

      <div class="edit-modal-footer">
        <button class="submit-btn" id="submitBtn" onclick="saveSystem()">Add system →</button>
        <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
const PASS = "DanteSystems97";
const SESS = 'ubs_admin_session';
const CAT_CSS = {"Operations":"cat-operations","Lead Generation":"cat-lead-gen","Content":"cat-content","Reporting":"cat-reporting","Communication":"cat-communication"};
const DEFAULT_CATEGORIES = ["Operations","Lead Generation","Content","Reporting","Communication"];

const DEFAULT_SYSTEMS = [
  { id:1, name:"Invoice Processing Agent", category:"Operations",
    description:"Monitors Gmail for incoming invoices, extracts data using GPT-4o Vision, and syncs with QuickBooks Desktop via Conductor.is. Includes a review dashboard and Slack notifications.",
    video:"https://www.youtube.com/embed/dQw4w9WgXcQ", tags:["Gmail","GPT-4o Vision","QuickBooks","Conductor.is","Slack"], status:"Published",
    benefits:["No more manual data entry","Invoices processed within seconds","Automatic sync with bookkeeping","Review dashboard for the office manager"],
    problems:["Time-consuming manual invoice processing","Errors from retyping data","Delays in the accounting workflow","No overview of outstanding invoices"] },
  { id:2, name:"Call Recording & Transcription", category:"Operations",
    description:"Monitors Gmail for voicemail messages, merges WAV files, transcribes via Whisper, generates summaries, and uploads to Google Drive and GHL CRM.",
    video:"", tags:["Whisper","Python","Railway","Google Drive","GHL CRM"], status:"Published",
    benefits:["Automatic transcription of all voicemails","Structured summaries per conversation","Stored directly in CRM and Drive","Never miss a message again"],
    problems:["Voicemails that go unlistened","No text archive of conversations","Manually logging call notes in the CRM"] },
  { id:3, name:"Lead Qualification Bot", category:"Lead Generation",
    description:"Automatically qualifies incoming leads via an AI conversation. Updates the CRM and sends a summary to the sales rep.",
    video:"", tags:["GHL","OpenAI","Webhooks","SMS"], status:"Published",
    benefits:["24/7 automatic lead qualification","Sales rep receives a ready-made summary","Higher conversion through fast follow-up","CRM always up to date"],
    problems:["Slow follow-up on incoming leads","Sales reps wasting time on unqualified leads","Inconsistent lead data in the CRM"] },
  { id:4, name:"LinkedIn Content Agent", category:"Content",
    description:"Generates weekly LinkedIn posts based on news articles and your writing style. Sends for review in Slack before publishing.",
    video:"", tags:["GPT-4","Slack","Make.com","RSS"], status:"Published",
    benefits:["Consistent weekly content output","Posts written in your own voice","Review step via Slack before publishing","Saves multiple hours every week"],
    problems:["No time for consistent content creation","Inconsistent presence on LinkedIn","Blank-page problem when writing"] },
  { id:5, name:"Weekly KPI Report", category:"Reporting",
    description:"Pulls data from CRM, Sheets, and ad platforms, builds a PDF report, and sends it automatically every Monday.",
    video:"", tags:["Google Sheets","Make.com","PDF","Email"], status:"Published",
    benefits:["Weekly report with zero manual effort","All KPIs combined in one overview","Always in the inbox on Monday","Easy to share with clients or team"],
    problems:["Hours spent manually building reports","Data scattered across multiple platforms","Inconsistent reporting frequency"] }
];

let _cats = null;
let _systems = null;

async function apiGet() {
  try { const r = await fetch('/api/data'); return await r.json(); } catch(e) { return {}; }
}
async function apiSave(payload) {
  payload.password = PASS;
  await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
}

async function loadCats() {
  if (_cats) return _cats;
  const d = await apiGet();
  _cats = d.categories || [...DEFAULT_CATEGORIES];
  return _cats;
}
async function saveCats(arr) { _cats = arr; await apiSave({ categories: arr }); _cats = null; }

async function addCategory() {
  const input = document.getElementById('catInput');
  const name = input.value.trim();
  if (!name) return;
  const cats = await loadCats();
  if (cats.includes(name)) { input.value=''; return; }
  cats.push(name);
  await saveCats(cats);
  input.value = '';
  await renderCategoryManager();
  await rebuildCatSelect();
}

async function deleteCategory(name) {
  const cats = await loadCats();
  await saveCats(cats.filter(c => c !== name));
  await renderCategoryManager();
  await rebuildCatSelect();
}

async function renderCategoryManager() {
  const cats = await loadCats();
  document.getElementById('catList').innerHTML = cats.map(c =>
    `<div class="cat-tag">${c}<button class="cat-tag-del" onclick="deleteCategory('${c.replace(/'/g,"\\'")}')">×</button></div>`
  ).join('');
}

async function rebuildCatSelect() {
  const cats = await loadCats();
  const sel = document.getElementById('f-cat');
  const current = sel.value;
  sel.innerHTML = '<option value="">Choose category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  if (cats.includes(current)) sel.value = current;
}

async function loadSys() {
  if (_systems) return _systems;
  const d = await apiGet();
  _systems = d.systems || [...DEFAULT_SYSTEMS];
  return _systems;
}
async function saveSys(arr) { _systems = arr; await apiSave({ systems: arr }); _systems = null; }
function embed(url) { if(!url) return ""; const m = url.match(/(?:v=|embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/); return m ? `https://www.youtube.com/embed/${m[1]}` : url; }

function tryLogin() {
  if (document.getElementById('pwInput').value === PASS) {
    sessionStorage.setItem(SESS,'1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='block';
    init();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
function logout() { sessionStorage.removeItem(SESS); location.reload(); }

async function init() {
  await renderCategoryManager();
  await rebuildCatSelect();
  await renderList();
}

async function openEditModal(id) {
  await renderCategoryManager();
  await rebuildCatSelect();
  if (id === null) {
    document.getElementById('editId').value = '';
    document.getElementById('editModalTitle').textContent = 'New system';
    document.getElementById('submitBtn').textContent = 'Add system →';
    ['f-name','f-desc','f-video','f-thumb','f-tags','f-benefits','f-problems'].forEach(i => document.getElementById(i).value='');
    document.getElementById('f-cat').value = '';
    document.getElementById('f-status').value = 'Published';
  } else {
    const systems = await loadSys();
    const sys = systems.find(s => s.id == id);
    if (!sys) return;
    document.getElementById('editId').value = id;
    document.getElementById('editModalTitle').textContent = 'Edit system';
    document.getElementById('submitBtn').textContent = 'Save changes →';
    document.getElementById('f-name').value = sys.name;
    document.getElementById('f-cat').value = sys.category;
    document.getElementById('f-desc').value = sys.description;
    document.getElementById('f-video').value = sys.video||'';
    document.getElementById('f-thumb').value = sys.thumbnail||'';
    document.getElementById('f-tags').value = (sys.tags||[]).join(', ');
    document.getElementById('f-benefits').value = (sys.benefits||[]).join('\n');
    document.getElementById('f-problems').value = (sys.problems||[]).join('\n');
    document.getElementById('f-status').value = sys.status==='Draft' ? 'Draft' : 'Published';
  }
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEditModal() {
  document.getElementById('editOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('editOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('editOverlay')) closeEditModal();
  });
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeEditModal(); });

async function saveSystem() {
  const name = document.getElementById('f-name').value.trim();
  const cat = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  const video = document.getElementById('f-video').value.trim();
  const thumb = document.getElementById('f-thumb').value.trim();
  const tagsRaw = document.getElementById('f-tags').value.trim();
  const benefitsRaw = document.getElementById('f-benefits').value.trim();
  const problemsRaw = document.getElementById('f-problems').value.trim();
  const status = document.getElementById('f-status').value;
  const editId = document.getElementById('editId').value;
  if (!name||!cat||!desc) { alert('Please fill in name, category and description.'); return; }
  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];
  const benefits = benefitsRaw ? benefitsRaw.split('\n').map(t=>t.trim()).filter(Boolean) : [];
  const problems = problemsRaw ? problemsRaw.split('\n').map(t=>t.trim()).filter(Boolean) : [];
  const systems = await loadSys();
  if (editId) {
    const idx = systems.findIndex(s => s.id == editId);
    if (idx > -1) systems[idx] = {...systems[idx], name, category:cat, description:desc, video:embed(video), thumbnail:thumb, tags, status, benefits, problems};
  } else {
    systems.push({id:Date.now(), name, category:cat, description:desc, video:embed(video), thumbnail:thumb, tags, status, benefits, problems});
  }
  await saveSys(systems);
  closeEditModal();
  await renderList();
}

async function toggleStatus(id) {
  const systems = await loadSys();
  const idx = systems.findIndex(s => s.id == id);
  if (idx > -1) {
    systems[idx].status = systems[idx].status === 'Draft' ? 'Published' : 'Draft';
    await saveSys(systems); await renderList();
  }
}

async function deleteSystem(id) {
  if (!confirm('Delete this system?')) return;
  const systems = await loadSys();
  await saveSys(systems.filter(s => s.id != id));
  await renderList();
}

async function renderList() {
  const systems = await loadSys();
  const list = document.getElementById('sysList');
  document.getElementById('countLbl').textContent = `${systems.length} system${systems.length!==1?'s':''}`;
  if (!systems.length) { list.innerHTML='<div class="empty-list">No systems yet. Click "+ New system" to add one.</div>'; return; }
  list.innerHTML = systems.map(sys => {
    const cls = CAT_CSS[sys.category] || 'cat-operations';
    const isDraft = sys.status === 'Draft';
    const statusBadge = isDraft
      ? `<span class="status-badge-draft">Draft</span>`
      : `<span class="status-badge-published">Published</span>`;
    const toggleLabel = isDraft ? 'Set Published' : 'Set Draft';
    return `<div class="sys-row${isDraft?' is-draft':''}" data-id="${sys.id}">
      <div class="sys-info">
        <div class="sys-name">${sys.name}</div>
        <div class="sys-meta"><span class="sys-cat ${cls}">${sys.category}</span>${statusBadge}</div>
        <div class="sys-desc">${sys.description.slice(0,140)}${sys.description.length>140?'…':''}</div>
      </div>
      <div class="sys-actions">
        <button class="btn-edit" onclick="event.stopPropagation();openEditModal(${sys.id})">Edit</button>
        <button class="btn-status" onclick="event.stopPropagation();toggleStatus(${sys.id})">${toggleLabel}</button>
        <button class="btn-del" onclick="event.stopPropagation();deleteSystem(${sys.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function exportJSON() {
  const systems = await loadSys();
  const blob = new Blob([JSON.stringify(systems,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'unbreakable-systems-library.json'; a.click();
}

if (sessionStorage.getItem(SESS)) {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminApp').style.display='block';
  init();
}
</script>
</body>
</html>
