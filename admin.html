<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050507;
    --surface: rgba(255,255,255,0.032);
    --surface2: rgba(255,255,255,0.058);
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #f0ece2;
    --green: #5c7a62;
    --green-base: #344a3a;
    --green-dim: rgba(92,122,98,0.2);
    --danger: #e05c5c;
    --text: #f0ece2;
    --muted: rgba(240,236,226,0.62);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:16px; line-height:1.6; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; }

  /* ── AURORA ── */
  .aurora { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .aurora-1 { position:absolute; top:-320px; left:50%; transform:translateX(-50%); width:1100px; height:700px; background:radial-gradient(ellipse at 50% 40%, rgba(52,74,58,0.55) 0%, rgba(52,74,58,0.2) 35%, transparent 70%); filter:blur(40px); }
  .aurora-2 { position:absolute; top:60px; left:-200px; width:600px; height:600px; background:radial-gradient(circle, rgba(52,74,58,0.25) 0%, transparent 65%); filter:blur(60px); }
  .aurora-3 { position:absolute; top:100px; right:-150px; width:500px; height:500px; background:radial-gradient(circle, rgba(100,180,255,0.04) 0%, transparent 65%); filter:blur(60px); }

  /* ── LOGIN ── */
  #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
  .login-box { background:rgba(255,255,255,0.032); border:1px solid var(--border); border-radius:20px; padding:52px 44px; width:100%; max-width:420px; text-align:center; backdrop-filter:blur(20px); }
  .login-logo { margin-bottom:10px; }
  .login-sub { color:var(--muted); font-size:14px; margin-bottom:36px; }
  .login-box input[type="password"] { width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:16px; padding:14px 18px; outline:none; text-align:center; letter-spacing:0.2em; margin-bottom:14px; transition:border-color 0.2s; }
  .login-box input:focus { border-color:rgba(92,122,98,0.5); }
  .login-btn { width:100%; background:var(--accent); color:#080809; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; border:none; padding:14px; border-radius:10px; cursor:pointer; transition:opacity 0.2s; }
  .login-btn:hover { opacity:0.88; }
  .login-err { color:var(--danger); font-size:13px; margin-top:12px; display:none; }

  /* ── APP ── */
  #adminApp { display:none; position:relative; z-index:1; }

  header {
    position:sticky; top:0; z-index:100;
    padding:0 56px; height:90px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.055);
    background:rgba(5,5,7,0.38);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
  }
  .h-left { display:flex; align-items:center; gap:16px; }
  .admin-badge { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; background:rgba(92,122,98,0.15); color:rgba(92,122,98,0.9); padding:5px 12px; border-radius:100px; border:1px solid rgba(92,122,98,0.25); }
  .logout-btn { font-size:13px; color:var(--muted); background:transparent; border:1px solid var(--border); padding:8px 18px; border-radius:100px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .logout-btn:hover { color:var(--text); border-color:var(--border-hover); }

  /* ── LAYOUT ── */
  .layout { display:grid; grid-template-columns:440px 1fr; min-height:calc(100vh - 90px); position:relative; z-index:1; }

  /* ── FORM PANEL ── */
  .form-panel { border-right:1px solid var(--border); padding:40px 44px; position:sticky; top:90px; max-height:calc(100vh - 90px); overflow-y:auto; }
  .panel-title { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; letter-spacing:-0.4px; margin-bottom:30px; color:var(--text); }

  .fg { margin-bottom:20px; }
  label { display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:8px; }
  input, select, textarea {
    width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border);
    border-radius:9px; color:#f0ece2; font-family:'DM Sans',sans-serif;
    font-size:15px; padding:12px 15px; outline:none; transition:border-color 0.2s;
  }
  input::placeholder, textarea::placeholder { color:rgba(240,236,226,0.3); }
  input:focus, select:focus, textarea:focus { border-color:rgba(92,122,98,0.5); background:rgba(255,255,255,0.09); color:#ffffff; }
  select option { background:#111; }
  textarea { resize:vertical; min-height:96px; line-height:1.6; }
  .hint { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.5; }
  .frow { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  /* Category manager */
  .cat-manager { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:9px; padding:14px 16px; }
  .cat-list { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px; min-height:32px; }
  .cat-tag { display:flex; align-items:center; gap:6px; background:rgba(92,122,98,0.15); border:1px solid rgba(92,122,98,0.25); color:rgba(92,122,98,0.9); font-size:12px; font-weight:500; padding:4px 10px; border-radius:100px; }
  .cat-tag-del { background:none; border:none; color:rgba(92,122,98,0.6); cursor:pointer; font-size:15px; line-height:1; padding:0; display:flex; align-items:center; transition:color 0.15s; }
  .cat-tag-del:hover { color:var(--danger); }
  .cat-add-row { display:flex; gap:8px; }
  .cat-add-row input { flex:1; font-size:13px; padding:8px 12px; }
  .cat-add-btn { background:rgba(92,122,98,0.2); border:1px solid rgba(92,122,98,0.3); color:rgba(92,122,98,0.9); font-size:13px; font-weight:600; padding:8px 14px; border-radius:8px; cursor:pointer; white-space:nowrap; transition:all 0.18s; font-family:'DM Sans',sans-serif; }
  .cat-add-btn:hover { background:rgba(92,122,98,0.3); }

  .submit-btn { width:100%; background:var(--accent); color:#080809; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; border:none; padding:14px; border-radius:9px; cursor:pointer; margin-top:8px; transition:opacity 0.2s; }
  .submit-btn:hover { opacity:0.88; }
  .cancel-btn { width:100%; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:14px; border:1px solid var(--border); padding:11px; border-radius:9px; cursor:pointer; margin-top:10px; transition:all 0.2s; }
  .cancel-btn:hover { color:var(--text); border-color:var(--border-hover); }
  hr { border:none; border-top:1px solid var(--border); margin:28px 0; }
  .export-row { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .export-lbl { font-size:13px; color:var(--muted); }
  .export-btn { font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500; background:var(--surface); color:var(--text); border:1px solid var(--border); padding:7px 16px; border-radius:100px; cursor:pointer; transition:all 0.2s; }
  .export-btn:hover { border-color:var(--border-hover); }

  /* ── LIST PANEL ── */
  .list-panel { padding:40px 44px; overflow-y:auto; }
  .list-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .list-title { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; letter-spacing:-0.4px; }
  .count-lbl { font-size:13px; color:var(--muted); }

  .sys-row { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 22px; margin-bottom:12px; display:flex; align-items:flex-start; gap:16px; transition:border-color 0.2s; }
  .sys-row:hover { border-color:var(--border-hover); }
  .sys-row.editing { border-color:rgba(92,122,98,0.4); background:rgba(92,122,98,0.05); }
  .sys-row.is-draft { opacity:0.55; }
  .sys-info { flex:1; min-width:0; }
  .sys-name { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; letter-spacing:-0.2px; margin-bottom:8px; }
  .sys-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .sys-cat { font-size:10px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; padding:3px 9px; border-radius:100px; }
  .status-badge-published { font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:rgba(92,122,98,0.9); background:rgba(92,122,98,0.15); border:1px solid rgba(92,122,98,0.25); padding:2px 9px; border-radius:100px; }
  .status-badge-draft { font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:rgba(240,236,226,0.4); background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:2px 9px; border-radius:100px; }
  .sys-desc { font-size:13.5px; color:var(--muted); line-height:1.6; }
  .sys-actions { display:flex; flex-direction:column; gap:8px; flex-shrink:0; align-items:flex-end; }
  .btn-edit { font-size:12px; font-family:'DM Sans',sans-serif; padding:6px 14px; border-radius:7px; cursor:pointer; background:var(--surface2); color:var(--text); border:1px solid var(--border); transition:all 0.2s; white-space:nowrap; }
  .btn-edit:hover { border-color:var(--border-hover); }
  .btn-del { font-size:12px; font-family:'DM Sans',sans-serif; padding:6px 14px; border-radius:7px; cursor:pointer; background:transparent; color:var(--danger); border:1px solid rgba(255,96,96,0.2); transition:all 0.2s; white-space:nowrap; }
  .btn-del:hover { background:rgba(255,96,96,0.08); border-color:rgba(255,96,96,0.4); }
  .btn-status { font-size:12px; font-family:'DM Sans',sans-serif; padding:6px 14px; border-radius:7px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.2s; white-space:nowrap; }
  .btn-status:hover { color:var(--text); border-color:var(--border-hover); }

  .empty-list { padding:48px 0; text-align:center; color:var(--muted); font-size:15px; }

  /* Category pills (same as index) */
  .cat-operations    { background:rgba(52,74,58,0.45);   color:#7a9e80;  border:1px solid rgba(92,122,98,0.2); }
  .cat-lead-gen      { background:rgba(160,110,70,0.12);  color:#b8906a;  border:1px solid rgba(160,110,70,0.22); }
  .cat-content       { background:rgba(80,110,145,0.14);  color:#7a9eb8;  border:1px solid rgba(80,110,145,0.22); }
  .cat-reporting     { background:rgba(115,95,145,0.12);  color:#9a88b0;  border:1px solid rgba(115,95,145,0.22); }
  .cat-communication { background:rgba(55,130,115,0.12);  color:#60a090;  border:1px solid rgba(55,130,115,0.22); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:rgba(255,255,255,0.03); border-radius:10px; }
  ::-webkit-scrollbar-thumb { background:rgba(92,122,98,0.35); border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(92,122,98,0.55); }
  * { scrollbar-width:thin; scrollbar-color:rgba(92,122,98,0.35) rgba(255,255,255,0.03); }
</style>
</head>
<body>

<!-- AURORA -->
<div class="aurora" aria-hidden="true">
  <div class="aurora-1"></div>
  <div class="aurora-2"></div>
  <div class="aurora-3"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="200" height="38" viewBox="0 0 200 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="3" width="5" height="31" rx="1.5" fill="#344a3a"/>
        <rect x="10" y="3" width="5" height="31" rx="1.5" fill="#5c7a62"/>
        <text x="22" y="19" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="18" fill="#f0ece2" letter-spacing="-0.5">Unbreakable</text>
        <text x="22" y="33" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="11" fill="rgba(240,236,226,0.45)" letter-spacing="2.8">SYSTEMS</text>
      </svg>
    </div>
    <p class="login-sub">Admin access only</p>
    <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Sign in →</button>
    <div class="login-err" id="loginErr">Incorrect password.</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <header>
    <div class="h-left">
      <svg width="180" height="30" viewBox="0 0 180 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="2" width="5" height="25" rx="1" fill="#344a3a"/>
        <rect x="10" y="2" width="5" height="25" rx="1" fill="#5c7a62"/>
        <text x="21" y="17" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="16" fill="#f0ece2" letter-spacing="-0.5">Unbreakable</text>
        <text x="21" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="10" fill="rgba(240,236,226,0.45)" letter-spacing="2.5">SYSTEMS</text>
      </svg>
      <span class="admin-badge">Admin</span>
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </header>

  <div class="layout">
    <!-- FORM -->
    <div class="form-panel">
      <div class="panel-title" id="formTitle">New system</div>
      <input type="hidden" id="editId">

      <div class="fg">
        <label>Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Invoice Processing Agent">
      </div>

      <div class="frow">
        <div class="fg">
          <label>Category *</label>
          <select id="f-cat">
            <option value="">Choose category</option>
          </select>
        </div>
        <div class="fg">
          <label>Status</label>
          <select id="f-status">
            <option value="Published">Published</option>
            <option value="Draft">Draft</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label>Manage categories</label>
        <div class="cat-manager">
          <div class="cat-list" id="catList"></div>
          <div class="cat-add-row">
            <input type="text" id="catInput" placeholder="New category name" onkeydown="if(event.key==='Enter'){event.preventDefault();addCategory();}">
            <button class="cat-add-btn" onclick="addCategory()">+ Add</button>
          </div>
        </div>
      </div>

      <div class="fg">
        <label>Description *</label>
        <textarea id="f-desc" placeholder="What does this system do?"></textarea>
      </div>
      <div class="fg">
        <label>YouTube URL</label>
        <input type="text" id="f-video" placeholder="https://www.youtube.com/watch?v=...">
      </div>
      <div class="fg">
        <label>Thumbnail URL <span style="color:var(--muted);font-weight:400;font-size:11px;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="f-thumb" placeholder="https://example.com/image.jpg">
        <div class="hint">Leave empty to use the auto-generated abstract preview.</div>
      </div>
      <div class="fg">
        <label>Tags</label>
        <input type="text" id="f-tags" placeholder="Gmail, GPT-4, Make.com">
        <div class="hint">Comma-separated</div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="saveSystem()">Add system →</button>
      <button class="cancel-btn" id="cancelBtn" style="display:none" onclick="cancelEdit()">Cancel</button>

      <hr>
      <div class="export-row">
        <span class="export-lbl">Export as JSON backup</span>
        <button class="export-btn" onclick="exportJSON()">Download</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="list-panel">
      <div class="list-hdr">
        <div class="list-title">Existing systems</div>
        <div class="count-lbl" id="countLbl">0 systems</div>
      </div>
      <div id="sysList"></div>
    </div>
  </div>
</div>

<script>
const PASS = "DanteSystems97";
const SESS = 'ubs_admin_session';
const CAT_CSS = {"Operations":"cat-operations","Lead Generation":"cat-lead-gen","Content":"cat-content","Reporting":"cat-reporting","Communication":"cat-communication"};

const DEFAULT_CATEGORIES = ["Operations","Lead Generation","Content","Reporting","Communication"];

const DEFAULT_SYSTEMS = [
  { id:1, name:"Invoice Processing Agent", category:"Operations",
    description:"Monitors Gmail for incoming invoices, extracts data using GPT-4o Vision, and syncs with QuickBooks Desktop via Conductor.is. Includes a review dashboard and Slack notifications.",
    video:"https://www.youtube.com/embed/dQw4w9WgXcQ", tags:["Gmail","GPT-4o Vision","QuickBooks","Conductor.is","Slack"], status:"Published",
    benefits:["No more manual data entry","Invoices processed within seconds","Automatic sync with bookkeeping","Review dashboard for the office manager"],
    problems:["Time-consuming manual invoice processing","Errors from retyping data","Delays in the accounting workflow","No overview of outstanding invoices"] },
  { id:2, name:"Call Recording & Transcription", category:"Operations",
    description:"Monitors Gmail for voicemail messages, merges WAV files, transcribes via Whisper, generates summaries, and uploads to Google Drive and GHL CRM.",
    video:"", tags:["Whisper","Python","Railway","Google Drive","GHL CRM"], status:"Published",
    benefits:["Automatic transcription of all voicemails","Structured summaries per conversation","Stored directly in CRM and Drive","Never miss a message again"],
    problems:["Voicemails that go unlistened","No text archive of conversations","Manually logging call notes in the CRM"] },
  { id:3, name:"Lead Qualification Bot", category:"Lead Generation",
    description:"Automatically qualifies incoming leads via an AI conversation. Updates the CRM and sends a summary to the sales rep.",
    video:"", tags:["GHL","OpenAI","Webhooks","SMS"], status:"Published",
    benefits:["24/7 automatic lead qualification","Sales rep receives a ready-made summary","Higher conversion through fast follow-up","CRM always up to date"],
    problems:["Slow follow-up on incoming leads","Sales reps wasting time on unqualified leads","Inconsistent lead data in the CRM"] },
  { id:4, name:"LinkedIn Content Agent", category:"Content",
    description:"Generates weekly LinkedIn posts based on news articles and your writing style. Sends for review in Slack before publishing.",
    video:"", tags:["GPT-4","Slack","Make.com","RSS"], status:"Published",
    benefits:["Consistent weekly content output","Posts written in your own voice","Review step via Slack before publishing","Saves multiple hours every week"],
    problems:["No time for consistent content creation","Inconsistent presence on LinkedIn","Blank-page problem when writing"] },
  { id:5, name:"Weekly KPI Report", category:"Reporting",
    description:"Pulls data from CRM, Sheets, and ad platforms, builds a PDF report, and sends it automatically every Monday.",
    video:"", tags:["Google Sheets","Make.com","PDF","Email"], status:"Published",
    benefits:["Weekly report with zero manual effort","All KPIs combined in one overview","Always in the inbox on Monday","Easy to share with clients or team"],
    problems:["Hours spent manually building reports","Data scattered across multiple platforms","Inconsistent reporting frequency"] }
];

// ── Categories (stored separately) ──
function loadCats() {
  try { const c = localStorage.getItem('ubs_categories'); return c ? JSON.parse(c) : [...DEFAULT_CATEGORIES]; }
  catch(e) { return [...DEFAULT_CATEGORIES]; }
}
function saveCats(arr) { localStorage.setItem('ubs_categories', JSON.stringify(arr)); }

function addCategory() {
  const input = document.getElementById('catInput');
  const name = input.value.trim();
  if (!name) return;
  const cats = loadCats();
  if (cats.includes(name)) { input.value=''; return; }
  cats.push(name);
  saveCats(cats);
  input.value = '';
  renderCategoryManager();
  rebuildCatSelect();
}

function deleteCategory(name) {
  const cats = loadCats().filter(c => c !== name);
  saveCats(cats);
  renderCategoryManager();
  rebuildCatSelect();
}

function renderCategoryManager() {
  const cats = loadCats();
  document.getElementById('catList').innerHTML = cats.map(c =>
    `<div class="cat-tag">${c}<button class="cat-tag-del" onclick="deleteCategory('${c.replace(/'/g,"\\'")}')">×</button></div>`
  ).join('');
}

function rebuildCatSelect() {
  const cats = loadCats();
  const sel = document.getElementById('f-cat');
  const current = sel.value;
  sel.innerHTML = '<option value="">Choose category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  if (cats.includes(current)) sel.value = current;
}

// ── Systems ──
function loadSys() {
  try { const s = localStorage.getItem('ubs_systems'); return s ? JSON.parse(s) : [...DEFAULT_SYSTEMS]; }
  catch(e) { return [...DEFAULT_SYSTEMS]; }
}
function saveSys(arr) { localStorage.setItem('ubs_systems', JSON.stringify(arr)); }
function embed(url) { if(!url) return ""; const m = url.match(/(?:v=|embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/); return m ? `https://www.youtube.com/embed/${m[1]}` : url; }

function tryLogin() {
  if (document.getElementById('pwInput').value === PASS) {
    sessionStorage.setItem(SESS,'1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='block';
    init();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
function logout() { sessionStorage.removeItem(SESS); location.reload(); }

function init() {
  renderCategoryManager();
  rebuildCatSelect();
  renderList();
}

function saveSystem() {
  const name = document.getElementById('f-name').value.trim();
  const cat = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  const video = document.getElementById('f-video').value.trim();
  const thumb = document.getElementById('f-thumb').value.trim();
  const tagsRaw = document.getElementById('f-tags').value.trim();
  const status = document.getElementById('f-status').value;
  const editId = document.getElementById('editId').value;
  if (!name||!cat||!desc) { alert('Please fill in name, category and description.'); return; }
  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];
  const systems = loadSys();
  if (editId) {
    const idx = systems.findIndex(s => s.id == editId);
    if (idx > -1) systems[idx] = {...systems[idx], name, category:cat, description:desc, video:embed(video), thumbnail:thumb, tags, status};
  } else {
    systems.push({id:Date.now(), name, category:cat, description:desc, video:embed(video), thumbnail:thumb, tags, status, benefits:[], problems:[]});
  }
  saveSys(systems); clearForm(); renderList();
}

function clearForm() {
  ['f-name','f-desc','f-video','f-thumb','f-tags'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-cat').value='';
  document.getElementById('f-status').value='Published';
  document.getElementById('editId').value='';
  document.getElementById('formTitle').textContent='New system';
  document.getElementById('submitBtn').textContent='Add system →';
  document.getElementById('cancelBtn').style.display='none';
  document.querySelectorAll('.sys-row').forEach(r=>r.classList.remove('editing'));
}
function cancelEdit() { clearForm(); }

function editSystem(id) {
  const sys = loadSys().find(s => s.id == id); if (!sys) return;
  document.getElementById('f-name').value = sys.name;
  document.getElementById('f-cat').value = sys.category;
  document.getElementById('f-desc').value = sys.description;
  document.getElementById('f-video').value = sys.video||'';
  document.getElementById('f-thumb').value = sys.thumbnail||'';
  document.getElementById('f-tags').value = (sys.tags||[]).join(', ');
  document.getElementById('f-status').value = sys.status==='Draft' ? 'Draft' : 'Published';
  document.getElementById('editId').value = id;
  document.getElementById('formTitle').textContent = 'Edit system';
  document.getElementById('submitBtn').textContent = 'Save changes →';
  document.getElementById('cancelBtn').style.display = 'block';
  document.querySelectorAll('.sys-row').forEach(r=>r.classList.toggle('editing', r.dataset.id==id));
  document.querySelector('.form-panel').scrollIntoView({behavior:'smooth'});
}

function toggleStatus(id) {
  const systems = loadSys();
  const idx = systems.findIndex(s => s.id == id);
  if (idx > -1) {
    systems[idx].status = systems[idx].status === 'Draft' ? 'Published' : 'Draft';
    saveSys(systems); renderList();
  }
}

function deleteSystem(id) {
  if (!confirm('Delete this system?')) return;
  saveSys(loadSys().filter(s => s.id != id)); renderList();
}

function renderList() {
  const systems = loadSys();
  const list = document.getElementById('sysList');
  document.getElementById('countLbl').textContent = `${systems.length} system${systems.length!==1?'s':''}`;
  if (!systems.length) { list.innerHTML='<div class="empty-list">No systems added yet.</div>'; return; }
  list.innerHTML = systems.map(sys => {
    const cls = CAT_CSS[sys.category] || 'cat-operations';
    const isDraft = sys.status === 'Draft';
    const statusBadge = isDraft
      ? `<span class="status-badge-draft">Draft</span>`
      : `<span class="status-badge-published">Published</span>`;
    const toggleLabel = isDraft ? 'Set Published' : 'Set Draft';
    return `<div class="sys-row${isDraft?' is-draft':''}" data-id="${sys.id}">
      <div class="sys-info">
        <div class="sys-name">${sys.name}</div>
        <div class="sys-meta"><span class="sys-cat ${cls}">${sys.category}</span>${statusBadge}</div>
        <div class="sys-desc">${sys.description.slice(0,120)}${sys.description.length>120?'…':''}</div>
      </div>
      <div class="sys-actions">
        <button class="btn-edit" onclick="editSystem(${sys.id})">Edit</button>
        <button class="btn-status" onclick="toggleStatus(${sys.id})">${toggleLabel}</button>
        <button class="btn-del" onclick="deleteSystem(${sys.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(loadSys(),null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'unbreakable-systems-library.json'; a.click();
}

if (sessionStorage.getItem(SESS)) {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminApp').style.display='block';
  init();
}
</script>
</body>
</html>
