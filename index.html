<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unbreakable Systems — System Library</title>
<link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAIAEBAAAAAAIAB0AQAAJgAAACAgAAAAACAA5gAAAJoBAACJUE5HDQoaCgAAAA1JSERSAAAAEAAAABAIBgAAAB/z/2EAAAE7SURBVHic7VO7SgNRFJy5d+OajVukELGx8APSbCGEdBKwCFvZaWOK/IAE/AV/IfgTgmhhYWOh4DdY2ShYhWzcZHfHIg83iyti7cCFc+bcM+ceLgOUgyXxj2CzG/pBJ/CKhfbpca1/3ve/m0IACHqBg5e1S2NsC1IkJidPV483AHB01g3tmr2gsD5NkruN98rhYDBIAMDMhYRneBT3IfmOW9lSZlrLKUZ7btXdzJT5BjwYbY+qAJQXgHWsAESSMmUSwXgpIBOnSTqrAFF+BZNPRJjcWvziRZIEQBZ6VpK/4F+gIEAhw+x/F2fOzwBAArLyFxA1koaGFOQuaBGudSxJGgLe5GPCogDTnXQM6RrkMJlO35jpIXfpPh7Hr8aaIcHb+m49QpnBmmHoN9qNWpHv9Dre3Ey/d2ZJvIJP2npxv5977zcAAAAASUVORK5CYIKJUE5HDQoaCgAAAA1JSERSAAAAIAAAACAIBgAAAHN6evQAAACtSURBVHic7c6xDcIwEEbhd2YMaCJGoGMFr4AUJCSGYAFWSCooWIEJEC0jkCJ7+FKiKD5LaWhyf3nRiz/wLX1ifdjFfURpBda/q3ZJQv15vl+55nA5RdCWUUOHpvpxvWebYMqUZvw4gFRB9WY1oA2ThgpZmY0JADbGfTu/UbMpAf4yBzjAAQ5wgAMc4AAHlABf497PbaTQmIAkcsz8sBf0bD6vadII9JrEbnyL3wC6ySklezVrAgAAAABJRU5ErkJggg==">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050507;
    --surface: rgba(255,255,255,0.032);
    --surface-hover: rgba(255,255,255,0.058);
    --border: rgba(255,255,255,0.07);
    --green: #5c7a62;
    --green-base: #344a3a;
    --text: #f0ece2;
    --muted: rgba(240,236,226,0.62);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:19px; line-height:1.65; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; }

  /* AURORA */
  .aurora { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .aurora-1 { position:absolute; top:-320px; left:50%; transform:translateX(-50%); width:1100px; height:700px; background:radial-gradient(ellipse at 50% 40%, rgba(52,74,58,0.55) 0%, rgba(52,74,58,0.2) 35%, transparent 70%); filter:blur(40px); }
  .aurora-2 { position:absolute; top:60px; left:-200px; width:600px; height:600px; background:radial-gradient(circle, rgba(52,74,58,0.25) 0%, transparent 65%); filter:blur(60px); }
  .aurora-3 { position:absolute; top:100px; right:-150px; width:500px; height:500px; background:radial-gradient(circle, rgba(100,180,255,0.04) 0%, transparent 65%); filter:blur(60px); }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:100;
    padding:0 4%; height:110px;
    display:flex; align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.055);
    background:rgba(5,5,7,0.38);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    transition:background 0.4s, border-color 0.4s;
  }
  header.scrolled {
    background:rgba(5,5,7,0.52);
    border-bottom-color:rgba(255,255,255,0.08);
  }

  /* HERO */
  .hero { position:relative; z-index:1; padding:120px 4% 96px; max-width:1680px; margin:0 auto; }
  .eyebrow { display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:500; letter-spacing:0.09em; text-transform:uppercase; color:rgba(92,122,98,0.9); border:1px solid rgba(92,122,98,0.3); background:rgba(52,74,58,0.25); padding:9px 22px; border-radius:100px; margin-bottom:34px; }
  .eyebrow-dot {
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
    background:#c87d4a;
    animation: pulse-dot 2.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(200,125,74,0.6); }
    55%  { box-shadow: 0 0 0 5px rgba(200,125,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(200,125,74,0); }
  }
  .hero h1 { font-family:'Space Grotesk',sans-serif; font-size:clamp(52px,6.5vw,90px); font-weight:700; line-height:1.05; letter-spacing:-2.5px; max-width:820px; margin-bottom:30px; }
  .hero h1 em { font-style:normal; color:#5c7a62; text-shadow:0 0 40px rgba(92,122,98,0.3); }
  .hero-sub { color:var(--muted); max-width:600px; font-size:22px; line-height:1.8; font-weight:400; }

  /* GLOW LINE */
  .glow-line { position:relative; z-index:1; height:1px; max-width:1680px; margin:0 auto; background:linear-gradient(90deg, transparent, rgba(92,122,98,0.5) 40%, rgba(92,122,98,0.5) 60%, transparent); box-shadow:0 0 18px rgba(92,122,98,0.22); }

  /* FILTERS */
  .filters-wrap { position:relative; z-index:1; max-width:1680px; margin:0 auto; padding:36px 4% 0; display:flex; gap:10px; flex-wrap:wrap; }
  .filter-btn { font-family:'DM Sans',sans-serif; font-size:16px; font-weight:500; padding:11px 26px; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.18s; }
  .filter-btn:hover { border-color:rgba(92,122,98,0.4); color:rgba(92,122,98,0.9); background:rgba(52,74,58,0.22); }
  .filter-btn.active { background:rgba(52,74,58,0.5); border-color:rgba(92,122,98,0.45); color:#5c7a62; font-weight:600; box-shadow:0 0 16px rgba(52,74,58,0.4); }

  /* GRID */
  .grid-wrap { position:relative; z-index:1; max-width:1680px; margin:0 auto; padding:32px 4% 120px; }
  .results-info { font-size:16px; color:var(--muted); margin-bottom:22px; }
  .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:22px; }

  /* CARD */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color 0.25s, transform 0.25s, background 0.25s, box-shadow 0.25s; animation:fadeUp 0.42s ease both; position:relative; cursor:pointer; display:flex; flex-direction:column; }
  .card::before { content:''; position:absolute; inset:0; border-radius:var(--radius); opacity:0; background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%), rgba(52,74,58,0.22), transparent 60%); transition:opacity 0.3s; pointer-events:none; z-index:0; }
  .card:hover::before { opacity:1; }
  .card:hover { border-color:rgba(92,122,98,0.38); background:var(--surface-hover); transform:translateY(-5px); box-shadow:0 0 0 1px rgba(52,74,58,0.35), 0 10px 36px rgba(0,0,0,0.45), 0 0 44px rgba(52,74,58,0.28); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  /* CARD THUMBNAIL */
  .card-thumb {
    position: relative; width: 100%; padding-top: 54%;
    overflow: hidden; border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 1;
    background-color: #0a100c;
    background-size: cover; background-position: center; background-repeat: no-repeat;
  }

  /* CARD BODY */
  .card-body { padding:28px 30px 30px; position:relative; z-index:1; display:flex; flex-direction:column; flex:1; }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:18px; flex-shrink:0; }
  .card-title { font-family:'Space Grotesk',sans-serif; font-size:21px; font-weight:600; line-height:1.3; letter-spacing:-0.2px; min-height:52px; }
  .cat-pill { font-size:12px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; padding:5px 13px; border-radius:100px; white-space:nowrap; flex-shrink:0; margin-top:2px; }
  .card-desc { font-size:18px; color:var(--muted); line-height:1.72; font-weight:400; margin-bottom:22px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; flex-shrink:0; }
  .card-tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.05); }
  .tag { font-size:15px; color:rgba(240,236,226,0.48); border:1px solid rgba(255,255,255,0.08); padding:5px 14px; border-radius:6px; }

  .cat-operations    { background:rgba(52,74,58,0.45);   color:#7a9e80;  border:1px solid rgba(92,122,98,0.2); }
  .cat-lead-gen      { background:rgba(160,110,70,0.12);  color:#b8906a;  border:1px solid rgba(160,110,70,0.22); }
  .cat-content       { background:rgba(80,110,145,0.14);  color:#7a9eb8;  border:1px solid rgba(80,110,145,0.22); }
  .cat-reporting     { background:rgba(115,95,145,0.12);  color:#9a88b0;  border:1px solid rgba(115,95,145,0.22); }
  .cat-communication { background:rgba(55,130,115,0.12);  color:#60a090;  border:1px solid rgba(55,130,115,0.22); }

  .empty-state { display:none; text-align:center; padding:80px 20px; color:var(--muted); font-size:15px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.78); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); display:none; align-items:flex-start; justify-content:center; padding:48px 20px; overflow-y:auto; }
  .modal-overlay.open { display:flex; }
  .modal { background:#0b0b0f; border:1px solid rgba(255,255,255,0.1); border-radius:22px; width:100%; max-width:960px; animation:modalIn 0.26s ease; position:relative; overflow:hidden; margin:auto; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.96) translateY(14px); } to { opacity:1; transform:scale(1) translateY(0); } }

  .modal-video { position:relative; width:100%; padding-top:56.25%; background:#070710; border-bottom:1px solid rgba(255,255,255,0.07); }
  .modal-video iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
  .modal-video-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background-size:cover; background-position:center; }
  .modal-video-placeholder::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.45); }
  .no-video-inner { position:relative; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .no-video-ring { width:64px; height:64px; border-radius:50%; border:1px solid rgba(92,122,98,0.4); background:rgba(52,74,58,0.45); display:flex; align-items:center; justify-content:center; }
  .no-video-ring svg { fill:rgba(92,122,98,0.7); margin-left:3px; }
  .no-video-label { font-size:12px; color:rgba(240,236,226,0.6); letter-spacing:0.08em; text-transform:uppercase; }

  .modal-body { padding:44px 52px 52px; }
  .modal-top { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:32px; }
  .modal-title-group { flex:1; }
  .modal-cat { display:inline-block; font-size:13px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:5px 14px; border-radius:100px; margin-bottom:16px; }
  .modal-title { font-family:'Space Grotesk',sans-serif; font-size:38px; font-weight:700; letter-spacing:-0.7px; line-height:1.1; }
  .modal-close { width:46px; height:46px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); background:transparent; color:var(--muted); font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; line-height:1; }
  .modal-close:hover { background:rgba(255,255,255,0.07); color:var(--text); }
  .modal-desc { font-size:20px; color:var(--muted); line-height:1.78; margin-bottom:36px; }
  .modal-section { margin-bottom:32px; }
  .modal-section-title { font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#5c7a62; margin-bottom:18px; }
  .modal-list { list-style:none; display:flex; flex-direction:column; gap:14px; }
  .modal-list li { display:flex; align-items:flex-start; gap:14px; font-size:19px; color:rgba(240,236,226,0.72); line-height:1.65; }
  .modal-list li::before { content:''; width:7px; height:7px; border-radius:50%; background:#5c7a62; flex-shrink:0; margin-top:9px; }
  .modal-tags { display:flex; flex-wrap:wrap; gap:9px; margin-top:36px; padding-top:30px; border-top:1px solid rgba(255,255,255,0.07); }
  .modal-tags .tag { font-size:15px; padding:6px 16px; }

  @media(max-width:1024px){
    .grid { grid-template-columns:repeat(2, 1fr); }
  }
  @media(max-width:768px){
    header,.hero,.filters-wrap,.grid-wrap { padding-left:20px; padding-right:20px; }
    header { height:80px; }
    .hero { padding-top:80px; }
    .grid { grid-template-columns:1fr; }
    .modal-body { padding:28px 24px 32px; }
    .modal-title { font-size:28px; }
    .modal-overlay { padding:20px 12px; }
  }
</style>
</head>
<body>
<div class="aurora"><div class="aurora-1"></div><div class="aurora-2"></div><div class="aurora-3"></div></div>

<header id="siteHeader">
  <svg width="370" height="58" viewBox="0 0 370 58" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="4" width="9" height="50" rx="2.5" fill="#344a3a"/>
    <rect x="16" y="4" width="9" height="50" rx="2.5" fill="#5c7a62"/>
    <text x="38" y="30" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="32" fill="#f0ece2" letter-spacing="-0.8">Unbreakable</text>
    <text x="38" y="50" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="15" fill="rgba(240,236,226,0.48)" letter-spacing="3.8">SYSTEMS</text>
  </svg>
</header>

<section class="hero">
  <div class="eyebrow"><span class="eyebrow-dot"></span>Systems Library</div>
  <h1>AI-powered systems<br>that <em>actually work</em></h1>
  <p class="hero-sub">Real systems. Real results. A curated overview of automation builds by Unbreakable Systems.</p>
</section>

<div class="glow-line"></div>

<div class="filters-wrap"><button class="filter-btn active" data-cat="all">All</button></div>

<div class="grid-wrap">
  <div class="results-info" id="resultsInfo"></div>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState">No systems in this category yet.</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-body">
      <div class="modal-top">
        <div class="modal-title-group">
          <span class="modal-cat" id="modalCat"></span>
          <div class="modal-title" id="modalTitle"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">&#215;</button>
      </div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-section" id="secBenefits">
        <div class="modal-section-title">Benefits</div>
        <ul class="modal-list" id="modalBenefits"></ul>
      </div>
      <div class="modal-section" id="secProblems">
        <div class="modal-section-title">Problems it solves</div>
        <ul class="modal-list" id="modalProblems"></ul>
      </div>
      <div class="modal-tags" id="modalTags"></div>
    </div>
  </div>
</div>

<script>
// ── Seeded RNG ──

// ── Default data ──
const DEFAULT_SYSTEMS = [
  { id:1, name:"Invoice Processing Agent", category:"Operations",
    description:"Monitors Gmail for incoming invoices, extracts data using GPT-4o Vision, and syncs with QuickBooks Desktop via Conductor.is. Includes a review dashboard and Slack notifications.",
    video:"https://www.youtube.com/embed/dQw4w9WgXcQ", tags:["Gmail","GPT-4o Vision","QuickBooks","Conductor.is","Slack"], status:"Live",
    benefits:["No more manual data entry","Invoices processed within seconds","Automatic sync with bookkeeping","Review dashboard for the office manager"],
    problems:["Time-consuming manual invoice processing","Errors from retyping data","Delays in the accounting workflow","No overview of outstanding invoices"] },
  { id:2, name:"Call Recording & Transcription", category:"Operations",
    description:"Monitors Gmail for voicemail messages, merges WAV files, transcribes via Whisper, generates summaries, and uploads to Google Drive and GHL CRM.",
    video:"", tags:["Whisper","Python","Railway","Google Drive","GHL CRM"], status:"Live",
    benefits:["Automatic transcription of all voicemails","Structured summaries per conversation","Stored directly in CRM and Drive","Never miss a message again"],
    problems:["Voicemails that go unlistened","No text archive of conversations","Manually logging call notes in the CRM"] },
  { id:3, name:"Lead Qualification Bot", category:"Lead Generation",
    description:"Automatically qualifies incoming leads via an AI conversation. Updates the CRM and sends a summary to the sales rep.",
    video:"", tags:["GHL","OpenAI","Webhooks","SMS"], status:"Demo",
    benefits:["24/7 automatic lead qualification","Sales rep receives a ready-made summary","Higher conversion through fast follow-up","CRM always up to date"],
    problems:["Slow follow-up on incoming leads","Sales reps wasting time on unqualified leads","Inconsistent lead data in the CRM"] },
  { id:4, name:"LinkedIn Content Agent", category:"Content",
    description:"Generates weekly LinkedIn posts based on news articles and your writing style. Sends for review in Slack before publishing.",
    video:"", tags:["GPT-4","Slack","Make.com","RSS"], status:"In Progress",
    benefits:["Consistent weekly content output","Posts written in your own voice","Review step via Slack before publishing","Saves multiple hours every week"],
    problems:["No time for consistent content creation","Inconsistent presence on LinkedIn","Blank-page problem when writing"] },
  { id:5, name:"Weekly KPI Report", category:"Reporting",
    description:"Pulls data from CRM, Sheets, and ad platforms, builds a PDF report, and sends it automatically every Monday.",
    video:"", tags:["Google Sheets","Make.com","PDF","Email"], status:"Live",
    benefits:["Weekly report with zero manual effort","All KPIs combined in one overview","Always in the inbox on Monday","Easy to share with clients or team"],
    problems:["Hours spent manually building reports","Data scattered across multiple platforms","Inconsistent reporting frequency"] }
];

const CAT = {"Operations":"cat-operations","Lead Generation":"cat-lead-gen","Content":"cat-content","Reporting":"cat-reporting","Communication":"cat-communication"};
let systems = [], activeFilter = "all";

function load() {
  try { const s = localStorage.getItem('ubs_systems'); systems = s ? JSON.parse(s) : DEFAULT_SYSTEMS; }
  catch(e) { systems = DEFAULT_SYSTEMS; }
}

function embed(url) {
  if (!url) return "";
  const m = url.match(/(?:v=|embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? `https://www.youtube.com/embed/${m[1]}` : url;
}

function renderFilters() {
  const bar = document.querySelector('.filters-wrap');
  bar.querySelectorAll('[data-cat]:not([data-cat="all"])').forEach(b => b.remove());
  [...new Set(systems.map(s => s.category))].forEach(cat => {
    const b = document.createElement('button');
    b.className = 'filter-btn'; b.dataset.cat = cat; b.textContent = cat;
    b.onclick = () => setFilter(cat); bar.appendChild(b);
  });
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderGrid();
}

function cardThumb(sys) {
  const imgSrc = sys.thumbnail || '';
  const bg = imgSrc ? `style="background-image:url('${imgSrc}')"` : '';
  return `<div class="card-thumb" ${bg}></div>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const info = document.getElementById('resultsInfo');
  const list = (activeFilter === "all" ? systems : systems.filter(s => s.category === activeFilter))
    .filter(s => s.status !== 'Draft');
  grid.innerHTML = '';
  if (!list.length) { empty.style.display = "block"; info.textContent = ""; return; }
  empty.style.display = "none";
  info.textContent = `${list.length} system${list.length !== 1 ? 's' : ''} ${activeFilter !== 'all' ? '— ' + activeFilter : ''}`;

  list.forEach((sys, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 55}ms`;
    const cls = CAT[sys.category] || 'cat-operations';
    const tags = (sys.tags||[]).slice(0,4).map(t => `<span class="tag">${t}</span>`).join('');
    card.innerHTML = `${cardThumb(sys)}<div class="card-body"><div class="card-top"><div class="card-title">${sys.name}</div><span class="cat-pill ${cls}">${sys.category}</span></div><div class="card-desc">${sys.description}</div><div class="card-tags">${tags}</div></div>`;
    card.addEventListener('mousemove', e => { const r = card.getBoundingClientRect(); card.style.setProperty('--mx', (e.clientX-r.left)+'px'); card.style.setProperty('--my', (e.clientY-r.top)+'px'); });
    card.addEventListener('click', () => openModal(sys));
    grid.appendChild(card);
  });
}

function openModal(sys) {
  const cls = CAT[sys.category] || 'cat-operations';
  const em = embed(sys.video);
  const videoEl = document.getElementById('modalVideo');
  if (em) {
    videoEl.innerHTML = `<iframe src="${em}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>`;
  } else {
    const imgSrc = sys.thumbnail || '';
    const bgStyle = imgSrc ? `style="background-image:url('${imgSrc}');background-size:cover;background-position:center;"` : '';
    videoEl.innerHTML = `<div class="modal-video-placeholder" ${bgStyle}></div>`;
  }
  const hasMedia = em || sys.thumbnail;
  document.getElementById('modalVideo').style.display = hasMedia ? 'block' : 'none';
  document.getElementById('modalCat').className = `modal-cat ${cls}`;
  document.getElementById('modalCat').textContent = sys.category;
  document.getElementById('modalTitle').textContent = sys.name;
  document.getElementById('modalDesc').textContent = sys.description;

  const b = sys.benefits||[];
  document.getElementById('modalBenefits').innerHTML = b.map(x=>`<li>${x}</li>`).join('');
  document.getElementById('secBenefits').style.display = b.length ? 'block' : 'none';

  const pr = sys.problems||[];
  document.getElementById('modalProblems').innerHTML = pr.map(x=>`<li>${x}</li>`).join('');
  document.getElementById('secProblems').style.display = pr.length ? 'block' : 'none';

  document.getElementById('modalTags').innerHTML = (sys.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('modalVideo').innerHTML = '';
}

document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===document.getElementById('modalOverlay')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
window.addEventListener('scroll', () => { document.getElementById('siteHeader').classList.toggle('scrolled', scrollY > 20); });

load(); renderFilters(); setFilter('all');
document.querySelector('[data-cat="all"]').onclick = () => setFilter('all');
window.addEventListener('storage', e => { if(e.key==='ubs_systems'){ load(); renderFilters(); setFilter(activeFilter); } });
</script>
</body>
</html>
